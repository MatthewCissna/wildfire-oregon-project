name: Deploy site to GitHub Pages

# Auto-deploys site/ to GitHub Pages on every push to main, and after the
# scheduled "Update predictions" workflow commits new actuals.
#
# One-time setup: in repo Settings → Pages → set "Source: GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow only one concurrent deployment (queued, not cancelled).
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
